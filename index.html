<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Typing Speed Test</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="header-container">
      <img src="assets/images/logo-small.svg" alt="game logo" />
      <div class="personal-best-container">
        <img
          src="assets/images/icon-personal-best.svg"
          alt="trophy icon"
          class="trophy-icon"
        />
        <p class="gray-text">Best:</p>
        <p class="score">0 WPM</p>
      </div>
    </div>

    <div>
      <div class="sub-heading">
        <div>
          <p>WPM:</p>
          <p>0</p>
        </div>
        <div>
          <p>Accuracy:</p>
          <p>100%</p>
        </div>
        <div>
          <p>Time:</p>
          <p>0:60</p>
        </div>
      </div>

      <!-- <label for="difficulty">Difficulty:</label> -->
      <select name="difficulty" id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <!-- <label for="mode">Mode:</label> -->
      <select name="mode" id="mode">
        <option value="timed">Timed (60s)</option>
        <option value="passage">Passage</option>
      </select>

      <!-- Passage -->
      <section>Passage</section>
      <div>
        <button>Start Typing Test</button>
        <p>Or click the text and start typing</p>
      </div>
    </div>

    <!-- Test Complete Start -->
    <div>
      <div class="test-complete-container">
        <img src="" alt="star icon" />
        <img src="" alt="green check mark" />
        <h3>Test Complete!</h3>
        <div>Solid run. Keep pushing to beat your high score.</div>

        <div>WPM:</div>
        <div>Accuracy:</div>
        <div>Characters:</div>
        <button>Go Again</button>
      </div>
    </div>

    <!-- <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </div> -->
  </body>
</html>
