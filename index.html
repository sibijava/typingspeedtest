<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Typing Speed Test</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="header-container">
      <img src="assets/images/logo-small.svg" alt="game logo" />
      <div class="personal-best-container">
        <img
          src="assets/images/icon-personal-best.svg"
          alt="trophy icon"
          class="trophy-icon"
        />
        <p class="gray-text">Best:</p>
        <p class="score">0 WPM</p>
      </div>
    </div>

    <div>
      <div class="sub-heading">
        <div class="score-tracker-container right-border">
          <p class="gray-text no-margin">WPM:</p>
          <p class="sub-heading-values">0</p>
        </div>
        <div class="score-tracker-container right-border">
          <p class="gray-text no-margin">Accuracy:</p>
          <p class="sub-heading-values">100%</p>
        </div>
        <div class="score-tracker-container no-border">
          <p class="gray-text no-margin">Time:</p>
          <p class="sub-heading-values">0:60</p>
        </div>
      </div>

      <!-- <label for="difficulty">Difficulty:</label> -->
      <div class="difficulty-and-mode__container">
        <select name="difficulty" id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <!-- <label for="mode">Mode:</label> -->
        <select name="mode" id="mode">
          <option value="timed">Timed (60s)</option>
          <option value="passage">Passage</option>
        </select>
      </div>

      <!-- Passage -->
      <div class="passage-container">
        <section>Passage</section>
        <div class="start-typing-container">
          <button class="start-typing-button">Start Typing Test</button>
          <p class="start-typing-description">
            Or click the text and start typing
          </p>
        </div>
      </div>
    </div>

    <!-- Test Complete Start -->

</html>
